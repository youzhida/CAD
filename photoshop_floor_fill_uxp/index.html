<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Floor Fill Auto</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="panel">
      <h1>Floor Fill Auto</h1>
      <p class="summary">一键生成图层2和图层7。第一版只做外圈浅灰、房间浅灰和阴影同步。</p>
      <button id="run-button">生成图层2 + 图层7</button>
      <section class="notes">
        <h2>当前约定</h2>
        <ul>
          <li>文档里有 PDF 智能对象线稿层</li>
          <li>优先使用现成的 <code>图层 2</code> 和 <code>图层 7</code></li>
          <li><code>图层 7</code> 继续沿用你现有的内阴影样式</li>
          <li>深灰装饰块和蓝色水体暂时不参与</li>
        </ul>
      </section>
      <pre id="status" class="status">准备就绪。</pre>
    </main>
    <script src="main.js"></script>
  </body>
  </html>
